<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buscar auditorías · LIVES</title>
<style>
:root{--navy:#1f3864;--green:#2a9d8f;--red:#e63946;--amber:#e9c46a;--ora:#f4a261;--bg:#eef2f6;--ink:#243040}
*{box-sizing:border-box}
body{margin:0;font-family:'Barlow',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
.top{background:var(--navy);color:#fff;padding:16px 20px}
.top h1{margin:0;font-size:19px;font-weight:800;letter-spacing:.3px}
.top .sub{font-size:12px;opacity:.8;margin-top:2px}
.wrap{max-width:1100px;margin:0 auto;padding:18px}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.filtros{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#667;margin-bottom:4px}
input,select{width:100%;border:1px solid #dce1e7;border-radius:9px;padding:10px;font:inherit;background:#fbfcfd}
.btns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btn{border:none;border-radius:9px;padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px}
.btn.prim{background:var(--navy);color:#fff}
.btn.sec{background:#fff;color:var(--navy);border:1px solid var(--navy)}
.btn.toggle{background:#fff;color:var(--navy);border:1px solid #dce1e7}
.btn.toggle.active{background:var(--amber);color:#5c4400;border-color:var(--amber)}
.hint{font-size:12px;color:#889;margin-top:8px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.top .txt{min-width:0}
.top-link{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;text-decoration:none;white-space:nowrap}
.top-link:hover{background:rgba(255,255,255,.28)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:#fff;text-align:left;padding:9px 10px;position:sticky;top:0;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:9px 10px;border-bottom:1px solid #eef1f4}
tr:hover td{background:#f6f9fb}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.ap{background:#e3f4f1;color:#1c7a6e}.re{background:#fde7e9;color:#c32030}.ov{background:#fcf3df;color:#9a7415}
.ver{color:var(--navy);font-weight:700;text-decoration:none;border:1px solid var(--navy);padding:5px 12px;border-radius:7px;font-size:12px;white-space:nowrap}
.ver:hover{background:var(--navy);color:#fff}
.tablewrap{overflow-x:auto;max-height:62vh;overflow-y:auto}
.estado{padding:24px;text-align:center;color:#889}
.count{font-size:13px;color:#667;margin-bottom:10px}
@media(max-width:560px){th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none}}
</style>
</head>
<body>
<div class="top">
  <div class="txt">
    <h1>Buscar auditorías</h1>
    <div class="sub">AC-009-25 · Calidad Manufactura · LIVES</div>
  </div>
  <a class="top-link" href="Auditoria_Final_EnVivo.html">📊 Ver dashboard en vivo</a>
</div>

<div class="wrap">
  <div class="card">
    <div class="filtros">
      <div><label>Proceso</label><select id="fProceso"><option value="">Todos</option><option>Costura (taller)</option><option>Acabados (taller)</option><option>Acabados Final (interno)</option></select></div>
      <div><label>Grupo</label><input id="fGrupo" placeholder="EFI-102"></div>
      <div><label>Estilo LIVES</label><input id="fEstilo" placeholder="24647"></div>
      <div><label>Color</label><input id="fColor" placeholder="White"></div>
      <div><label>PO</label><input id="fPo" placeholder="6002469"></div>
      <div><label>Cliente</label><select id="fCliente"><option value="">Todos</option></select></div>
      <div><label>Auditor</label><select id="fAuditor"><option value="">Todos</option></select></div>
      <div><label>Resultado</label><select id="fResultado"><option value="">Todos</option><option value="aprob">Aprobado</option><option value="rech">Rechazado</option><option value="override">Override</option></select></div>
      <div><label>Desde</label><input id="fDesde" type="date"></div>
      <div><label>Hasta</label><input id="fHasta" type="date"></div>
    </div>
    <div class="btns">
      <button class="btn prim" id="btnBuscar">Buscar</button>
      <button class="btn sec" id="btnLimpiar">Limpiar</button>
      <button class="btn toggle" id="btnReprocesos" type="button">Reprocesos</button>
      <button class="btn toggle" id="btnLicencias" type="button">Licencias</button>
    </div>
    <div class="hint">Deja los campos vacíos y pulsa Buscar para ver las más recientes. Puedes combinar filtros.</div>
  </div>

  <div class="card">
    <div class="count" id="count"></div>
    <div class="tablewrap">
      <table>
        <thead><tr><th>ID</th><th>Fecha</th><th>Cliente / Grupo</th><th>Estilo / PO</th><th>Auditor</th><th>Resultado</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="estado" id="estado">Cargando auditorías…</div>
  </div>
</div>

<script>
const SHEET_ID='1zM-ajBkOs_PgyzEaXh_gVJ1seXvjRJSVO1ZRql7KnVQ';
let DATA=[];
// índices de columnas en AUDITORÍAS
const C={id:0,fecha:1,nAud:2,proceso:3,intext:4,servicio:5,cliente:6,grupo:7,estiloL:8,estiloC:9,po:10,color:11,
         destino:12,pedido:13,recibido:14,lote:15,licencia:16,resAql:23,override:24,resFinal:27,auditor:31,semana:32,
         computable:38,reproceso:39};
// Filtros toggle (Reprocesos / Licencias) — no van como columnas en la tabla, solo filtran
let filtroReproceso=false, filtroLicencia=false;
function esVerdadero(v){
  const s=norm(v);
  if(!s) return false;
  return !['0','no','false','n/a','na'].includes(s);
}

async function gviz(tab){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
  const r=await fetch(url); const t=await r.text();
  const j=JSON.parse(t.substring(t.indexOf('{'),t.lastIndexOf('}')+1));
  return (j.table.rows||[]).map(row=>(row.c||[]).map(c=>c&&c.v!=null?String(c.v):''));
}
function norm(s){return String(s||'').trim().toLowerCase();}
// Convierte fechas de gviz "Date(2026,5,15)" a "2026-06-15". Si ya es texto normal, lo deja.
function fechaTxt(v){
  if(v==null||v==='') return '';
  const s=String(v);
  const m=s.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m){
    const a=m[1], mes=('0'+(parseInt(m[2])+1)).slice(-2), d=('0'+m[3]).slice(-2);
    return a+'-'+mes+'-'+d;
  }
  return s.substring(0,10);
}
function esEnc(r){return !r[0]||norm(r[0])==='id_auditoria'||norm(r[0])==='';}

async function cargar(){
  try{
    const rows=await gviz('AUDITORÍAS');
    DATA=rows.filter(r=>!esEnc(r));
    // poblar selects de cliente y auditor
    llenarSelect('fCliente', [...new Set(DATA.map(r=>r[C.cliente]).filter(Boolean))].sort());
    llenarSelect('fAuditor', [...new Set(DATA.map(r=>r[C.auditor]).filter(Boolean))].sort());
    buscar();
  }catch(e){
    document.getElementById('estado').textContent='No se pudo cargar. Revisa tu conexión.';
  }
}
function llenarSelect(id,vals){
  const s=document.getElementById(id);
  vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});
}
function fechaOK(fstr,desde,hasta){
  if(!desde&&!hasta) return true;
  const f=fechaTxt(fstr);
  if(!f) return false;
  if(desde&&f<desde) return false;
  if(hasta&&f>hasta) return false;
  return true;
}
function badge(res){
  const r=norm(res);
  if(r.indexOf('override')>=0) return '<span class="tag ov">OVERRIDE</span>';
  if(r.indexOf('aprob')>=0) return '<span class="tag ap">APROBADO</span>';
  if(r.indexOf('rech')>=0) return '<span class="tag re">RECHAZADO</span>';
  return res||'—';
}
function buscar(){
  const proc=val('fProceso'),po=norm(val('fPo')),gr=norm(val('fGrupo')),es=norm(val('fEstilo')),co=norm(val('fColor')),
        cli=val('fCliente'),aud=val('fAuditor'),resu=norm(val('fResultado')),desde=val('fDesde'),hasta=val('fHasta');
  let res=DATA.filter(r=>{
    if(proc&&r[C.proceso]!==proc) return false;
    if(po&&norm(r[C.po]).indexOf(po)<0) return false;
    if(gr&&norm(r[C.grupo]).indexOf(gr)<0) return false;
    if(es&&norm(r[C.estiloL]).indexOf(es)<0) return false;
    if(co&&norm(r[C.color]).indexOf(co)<0) return false;
    if(cli&&r[C.cliente]!==cli) return false;
    if(aud&&r[C.auditor]!==aud) return false;
    if(resu&&norm(r[C.resFinal]).indexOf(resu)<0) return false;
    if(!fechaOK(r[C.fecha],desde,hasta)) return false;
    if(filtroReproceso&&!esVerdadero(r[C.reproceso])) return false;
    if(filtroLicencia&&!esVerdadero(r[C.licencia])) return false;
    return true;
  });
  // más recientes primero
  res.sort((a,b)=>fechaTxt(b[C.fecha]).localeCompare(fechaTxt(a[C.fecha])));
  pintar(res);
}
function pintar(res){
  const tb=document.getElementById('tbody'), est=document.getElementById('estado'), cnt=document.getElementById('count');
  tb.innerHTML='';
  if(!res.length){ est.style.display='block'; est.textContent='Sin resultados. Ajusta los filtros.'; cnt.textContent=''; return; }
  est.style.display='none';
  cnt.textContent=res.length+' auditoría(s) encontrada(s)';
  res.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><b>${r[C.id]||''}</b></td>
      <td>${fechaTxt(r[C.fecha])}</td>
      <td>${r[C.cliente]||''}<br><span style="color:#889">${r[C.grupo]||''}</span></td>
      <td>${r[C.estiloL]||''}<br><span style="color:#889">${r[C.po]||''}</span></td>
      <td>${r[C.auditor]||''}</td>
      <td>${badge(r[C.resFinal])}</td>
      <td><a class="ver" href="ver.html?id=${encodeURIComponent(r[C.id])}">Ver / PDF</a></td>`;
    tb.appendChild(tr);
  });
}
function val(id){return document.getElementById(id).value.trim();}

document.getElementById('btnBuscar').onclick=buscar;
document.getElementById('btnLimpiar').onclick=()=>{
  ['fPo','fGrupo','fEstilo','fColor','fDesde','fHasta'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fProceso').value=''; document.getElementById('fCliente').value=''; document.getElementById('fAuditor').value=''; document.getElementById('fResultado').value='';
  filtroReproceso=false; filtroLicencia=false;
  document.getElementById('btnReprocesos').classList.remove('active');
  document.getElementById('btnLicencias').classList.remove('active');
  buscar();
};
document.getElementById('btnReprocesos').onclick=()=>{
  filtroReproceso=!filtroReproceso;
  document.getElementById('btnReprocesos').classList.toggle('active',filtroReproceso);
  buscar();
};
document.getElementById('btnLicencias').onclick=()=>{
  filtroLicencia=!filtroLicencia;
  document.getElementById('btnLicencias').classList.toggle('active',filtroLicencia);
  buscar();
};
// Enter en cualquier input dispara búsqueda
['fPo','fGrupo','fEstilo','fColor'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')buscar();}));

cargar();
</script>
</body>
</html>
