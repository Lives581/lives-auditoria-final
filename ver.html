<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reporte de auditoría · LIVES</title>
<style>
:root{--navy:#1f3864;--green:#2a9d8f;--red:#e63946;--amber:#e9c46a;--ink:#243040;--line:#d8dee6}
*{box-sizing:border-box}
body{margin:0;font-family:'Barlow',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#e9edf2;color:var(--ink)}
.toolbar{position:sticky;top:0;background:var(--navy);color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:10}
.toolbar h1{font-size:15px;margin:0;font-weight:700}
.toolbar .acts{display:flex;gap:8px}
.tbtn{border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:13px}
.tbtn.print{background:var(--amber);color:var(--navy)}
.tbtn.back{background:#33507e;color:#fff}
.page{max-width:820px;margin:18px auto;background:#fff;padding:30px 34px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--navy);padding-bottom:12px;margin-bottom:16px}
.head .brand{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:.5px}
.head .code{font-size:12px;color:#778}
.head .res{text-align:right}
.bigres{font-size:20px;font-weight:800;padding:6px 16px;border-radius:8px;display:inline-block}
.bigres.ap{background:#e3f4f1;color:#1c7a6e}.bigres.re{background:#fde7e9;color:#c32030}.bigres.ov{background:#fcf3df;color:#9a7415}
h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:5px;margin:20px 0 10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 18px}
.f .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#889}
.f .v{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
th{background:#f0f3f7;text-align:left;padding:7px 9px;font-size:11px;text-transform:uppercase;color:#556;border-bottom:1px solid var(--line)}
td{padding:7px 9px;border-bottom:1px solid #eef1f4}
.aqlbox{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.aqlbox .b{background:#f6f8fb;border-radius:8px;padding:10px;text-align:center}
.aqlbox .b .k{font-size:10px;text-transform:uppercase;color:#889}
.aqlbox .b .v{font-size:18px;font-weight:800;color:var(--navy)}
.ovbox{background:#fcf3df;border:1px solid #e9c46a;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px}
.coment{background:#f6f8fb;border-radius:8px;padding:12px;font-size:14px;white-space:pre-wrap;min-height:20px}
.fotos{display:block;margin-top:8px}
.fotos figure{margin:0 0 14px}
.fotos img{width:100%;height:auto;display:block;border-radius:8px;border:1px solid var(--line);cursor:zoom-in;background:#f3f5f8}
.fotoblock{margin-top:14px}
.fotoblock .lab{font-weight:700;font-size:12px;color:var(--navy);background:#eef2f7;padding:5px 10px;border-radius:6px;display:inline-block;margin-bottom:6px}
/* lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(15,20,30,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#lb.show{display:flex}
#lb .lbScroll{max-width:96vw;max-height:88vh;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pinch-zoom;border-radius:6px}
#lb img{max-width:96vw;max-height:88vh;object-fit:contain;border-radius:6px;transition:transform .15s;transform-origin:center;cursor:zoom-in;display:block}
#lb img.zoom{max-width:none;max-height:none;cursor:zoom-out}
#lb .close{position:absolute;top:16px;right:20px;background:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:22px;cursor:pointer;font-weight:700}
#lb .rotbtn{position:absolute;top:16px;left:20px;background:#e9c46a;color:#1f3864;border:none;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:700}
#lb .hint{color:#cdd; margin-top:12px;font-size:13px}
.estado{padding:40px;text-align:center;color:#889}
.foot{margin-top:24px;border-top:1px solid var(--line);padding-top:10px;font-size:11px;color:#99a;display:flex;justify-content:space-between}
@media print{
  .toolbar{display:none}
  #lb{display:none!important}
  body{background:#fff}
  .page{box-shadow:none;margin:0;max-width:none;padding:0}
  h2{break-after:avoid}
  /* fotos grandes, sin saltos forzados (evita páginas en blanco) */
  .fotos{display:block}
  .fotos figure{break-inside:avoid;page-break-inside:avoid;text-align:center;margin:0 0 6mm}
  .fotos img{display:block;max-width:100%;max-height:175mm;width:auto;height:auto;margin:0 auto;object-fit:contain;border:1px solid #ccc}
  .fotoblock{break-inside:auto}
  .fotoblock .lab{break-after:avoid}
}
</style>
</head>
<body>
<div class="toolbar">
  <h1 id="ttl">Reporte de auditoría</h1>
  <div class="acts">
    <button class="tbtn back" onclick="location.href='buscar.html'">← Buscar</button>
    <button class="tbtn print" onclick="window.print()">🖨 Imprimir / PDF</button>
  </div>
</div>

<div class="page" id="page"><div class="estado" id="estado">Cargando auditoría…</div></div>

<div id="lb" onclick="cerrarLb(event)">
  <button class="close" onclick="cerrarLb(event,true)">×</button>
  <button class="rotbtn" onclick="girarLb(event)">⟳ Girar</button>
  <div class="lbScroll"><img id="lbImg" src="" alt="foto ampliada"></div>
  <div class="hint">⟳ Girar para enderezar · rueda o pellizca para zoom · doble clic para acercar · toca fuera para cerrar</div>
</div>

<script>
const SHEET_ID='1zM-ajBkOs_PgyzEaXh_gVJ1seXvjRJSVO1ZRql7KnVQ';
const C={id:0,fecha:1,nAud:2,proceso:3,intext:4,servicio:5,cliente:6,grupo:7,estiloL:8,estiloC:9,po:10,color:11,
  destino:12,pedido:13,recibido:14,lote:15,licencia:16,loteAql:17,muestra:18,nivel:19,aceptaMax:20,rechazaMin:21,
  totalDef:22,resAql:23,override:24,ovWho:25,ovWhy:26,resFinal:27,medMuestra:28,medDef:29,medRes:30,auditor:31,
  semana:32,fotoGen:33,loteKey:34,repetido:35,loteCont:36,anio:37,computable:38,reproceso:39,coment:40,totalDer:41,
  fotosMed:42,fotosPro:43};

const qs=new URLSearchParams(location.search), ID=qs.get('id');

async function gviz(tab){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
  const r=await fetch(url); const t=await r.text();
  const j=JSON.parse(t.substring(t.indexOf('{'),t.lastIndexOf('}')+1));
  return (j.table.rows||[]).map(row=>(row.c||[]).map(c=>c&&c.v!=null?String(c.v):''));
}
function norm(s){return String(s||'').trim().toLowerCase();}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// Convierte un link de Drive en URL de imagen visible
function driveImg(url){
  if(!url) return '';
  const m=String(url).match(/[-\w]{25,}/);   // id de Drive
  return m ? `https://drive.google.com/thumbnail?id=${m[0]}&sz=w1600` : url;
}
function fotosDe(celda){
  if(!celda) return [];
  return String(celda).split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
}

async function cargar(){
  if(!ID){ document.getElementById('estado').textContent='Falta el ID de la auditoría.'; return; }
  let rows, defs, ders;
  try{
    [rows,defs,ders]=await Promise.all([gviz('AUDITORÍAS'),gviz('DEFECTOS'),gviz('DERIVADOS')]);
  }catch(e){ document.getElementById('estado').textContent='No se pudo cargar.'; return; }

  const r=rows.find(x=>String(x[C.id]).trim()===ID.trim());
  if(!r){ document.getElementById('estado').textContent='No se encontró la auditoría '+ID; return; }

  const misDef=defs.filter(d=>String(d[0]).trim()===ID.trim());
  const misDer=ders.filter(d=>String(d[0]).trim()===ID.trim());
  render(r,misDef,misDer);
}

function render(r,defs,ders){
  document.getElementById('ttl').textContent='Reporte · '+r[C.id];
  const resF=r[C.resFinal]||'—', rn=norm(resF);
  let cls=rn.indexOf('override')>=0?'ov':(rn.indexOf('aprob')>=0?'ap':(rn.indexOf('rech')>=0?'re':''));

  const esCostura=/costura/i.test(r[C.proceso]||'');
  const fMed=fotosDe(r[C.fotosMed]), fPro=fotosDe(r[C.fotosPro]);

  function fil(k,v){return `<div class="f"><div class="k">${k}</div><div class="v">${esc(v)||'—'}</div></div>`;}

  let html=`
  <div class="head">
    <div>
      <div class="brand">LIVES</div>
      <div class="code">Auditoría Final / Acabados · AC-009-25</div>
      <div class="code">${esc(r[C.id])}</div>
    </div>
    <div class="res">
      <div class="bigres ${cls}">${esc(resF)}</div>
      <div class="code" style="margin-top:6px">Semana ${esc(r[C.semana])} · ${esc((r[C.fecha]||'').substring(0,10))}</div>
    </div>
  </div>

  <h2>Datos del lote</h2>
  <div class="grid">
    ${fil('Cliente',r[C.cliente])}
    ${fil('Grupo',r[C.grupo])}
    ${fil('Proceso',r[C.proceso])}
    ${fil('Estilo LIVES',r[C.estiloL])}
    ${fil('Estilo cliente',r[C.estiloC])}
    ${fil('PO',r[C.po])}
    ${fil('Color',r[C.color])}
    ${fil('Destino',r[C.destino])}
    ${fil('Servicio / Taller',r[C.servicio])}
    ${fil('N° auditoría',r[C.nAud])}
    ${fil('Interna/Externa',r[C.intext])}
    ${fil('Auditor',r[C.auditor])}
  </div>

  <h2>Cantidades y AQL</h2>
  <div class="grid">
    ${fil('Cant. pedido',r[C.pedido])}
    ${fil('Total recibido',r[C.recibido])}
    ${fil('Lote real',r[C.lote])}
    ${fil('Licencia',r[C.licencia])}
    ${fil('Reproceso',r[C.reproceso])}
    ${fil('Nivel AQL',r[C.nivel])}
  </div>
  <div class="aqlbox">
    <div class="b"><div class="k">Muestra</div><div class="v">${esc(r[C.muestra])||'—'}</div></div>
    <div class="b"><div class="k">Acepta máx</div><div class="v">${esc(r[C.aceptaMax])||'—'}</div></div>
    <div class="b"><div class="k">Total defectos</div><div class="v">${esc(r[C.totalDef])||'0'}</div></div>
    <div class="b"><div class="k">Resultado AQL</div><div class="v" style="font-size:14px">${esc(r[C.resAql])||'—'}</div></div>
  </div>`;

  if(norm(r[C.override]).indexOf('s')===0){
    html+=`<div class="ovbox"><b>Pase al rechazo (override):</b> autorizado por ${esc(r[C.ovWho])||'—'} · Motivo: ${esc(r[C.ovWhy])||'—'}</div>`;
  }

  // Defectos
  html+=`<h2>Defectos (${defs.length})</h2>`;
  if(defs.length){
    html+=`<table><thead><tr><th>Sección</th><th>Categoría</th><th>Cant.</th><th>Detalle</th></tr></thead><tbody>`;
    defs.forEach(d=>{ html+=`<tr><td>${esc(d[1])}</td><td>${esc(d[2])}</td><td>${esc(d[3])}</td><td>${esc(d[4])}</td></tr>`; });
    html+=`</tbody></table>`;
  } else { html+=`<div class="coment">Sin defectos registrados.</div>`; }

  // Derivados
  html+=`<h2>Derivados (${ders.length})</h2>`;
  if(ders.length){
    html+=`<table><thead><tr><th>Categoría</th><th>Cant. (lote)</th><th>Detalle</th></tr></thead><tbody>`;
    ders.forEach(d=>{ html+=`<tr><td>${esc(d[2])}</td><td>${esc(d[3])}</td><td>${esc(d[4])}</td></tr>`; });
    html+=`</tbody></table>`;
  } else { html+=`<div class="coment">Sin derivados registrados.</div>`; }

  // Medidas
  html+=`<h2>Medidas</h2><div class="grid">
    ${fil('Muestra medidas',r[C.medMuestra])}
    ${fil('Def. medidas',r[C.medDef])}
    ${fil('Resultado',r[C.medRes])}
  </div>`;

  // Comentario
  html+=`<h2>Comentario</h2><div class="coment">${esc(r[C.coment])||'—'}</div>`;

  // FOTOS
  html+=`<h2>Fotos</h2>`;
  if(esCostura && fPro.length){
    html+=`<div class="fotoblock"><span class="lab">MEDIDAS DE PROCESO (COSTURA)</span><div class="fotos">`;
    fPro.forEach(u=>{ const s=driveImg(u); html+=`<figure><img src="${s}" alt="proceso" loading="lazy" onclick="abrirLb(this.src)"></figure>`; });
    html+=`</div></div>`;
  }
  if(fMed.length){
    html+=`<div class="fotoblock"><span class="lab">HOJAS DE MEDIDAS</span><div class="fotos">`;
    fMed.forEach(u=>{ const s=driveImg(u); html+=`<figure><img src="${s}" alt="medidas" loading="lazy" onclick="abrirLb(this.src)"></figure>`; });
    html+=`</div></div>`;
  }
  if(!fMed.length && !(esCostura&&fPro.length)){
    html+=`<div class="coment">Sin fotos registradas.</div>`;
  }

  html+=`<div class="foot"><span>LIVES · Calidad Manufactura</span><span>Generado ${new Date().toLocaleDateString('es-PE')}</span></div>`;

  document.getElementById('page').innerHTML=html;
}

let lbScale=1;
function aplicarZoom(){ const im=document.getElementById('lbImg'); im.style.transform='rotate('+lbDeg+'deg) scale('+lbScale+')'; im.classList.toggle('zoom',lbScale>1); }
let lbDeg=0;
function abrirLb(src){
  const lb=document.getElementById('lb'); lbScale=1; lbDeg=0;
  const im=document.getElementById('lbImg');
  im.className=''; im.style.transform='';
  im.src=src; lb.classList.add('show');
  aplicarZoom();
}
function girarLb(e){ if(e)e.stopPropagation(); lbDeg=(lbDeg+90)%360; aplicarZoom(); }
function cerrarLb(e,force){ if(force||e.target.id==='lb'){ document.getElementById('lb').classList.remove('show'); } }
// rueda del mouse para zoom
document.addEventListener('wheel',function(e){
  const lb=document.getElementById('lb'); if(!lb.classList.contains('show')) return;
  if(e.target.id==='lbImg'||e.target.closest('.lbScroll')){ e.preventDefault();
    lbScale += (e.deltaY<0?0.2:-0.2); lbScale=Math.max(1,Math.min(5,lbScale)); aplicarZoom(); }
},{passive:false});
// doble clic alterna zoom
document.addEventListener('dblclick',function(e){
  if(e.target.id==='lbImg'){ lbScale = lbScale>1?1:2.5; aplicarZoom(); }
});

cargar();
</script>
</body>
</html>
