<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reporte de auditoría · LIVES</title>
<style>
:root{--navy:#1f3864;--green:#2a9d8f;--red:#e63946;--amber:#e9c46a;--ink:#243040;--line:#d8dee6}
*{box-sizing:border-box}
body{margin:0;font-family:'Barlow',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#e9edf2;color:var(--ink)}
.toolbar{position:sticky;top:0;background:var(--navy);color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:10}
.toolbar h1{font-size:15px;margin:0;font-weight:700}
.toolbar .acts{display:flex;gap:8px}
.tbtn{border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:13px;min-width:150px;text-align:center}
.tbtn.print{background:var(--amber);color:var(--navy)}
.tbtn.fotos{background:#2a9d8f;color:#fff}
.tbtn.proc{background:#e76f51;color:#fff}
.tbtn.back{background:#33507e;color:#fff}
.tbtn.share{background:#25D366;color:#fff}
.page{max-width:820px;margin:18px auto;background:#fff;padding:30px 34px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--navy);padding-bottom:12px;margin-bottom:16px}
.head .brand{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:.5px}
.head .code{font-size:12px;color:#778}
.head .res{text-align:right}
.bigres{font-size:20px;font-weight:800;padding:6px 16px;border-radius:8px;display:inline-block}
.bigres.ap{background:#e3f4f1;color:#1c7a6e}.bigres.re{background:#fde7e9;color:#c32030}.bigres.ov{background:#fcf3df;color:#9a7415}
h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:5px;margin:20px 0 10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 18px}
.f .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#889}
.f .v{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
th{background:#f0f3f7;text-align:left;padding:7px 9px;font-size:11px;text-transform:uppercase;color:#556;border-bottom:1px solid var(--line)}
td{padding:7px 9px;border-bottom:1px solid #eef1f4}
.deffotoWrap{display:flex;flex-direction:column;gap:3px}
.deflab{font-size:10px;font-weight:700;color:var(--navy)}
.deffoto{width:54px;height:54px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:zoom-in;display:block}
.aqlbox{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.aqlbox .b{background:#f6f8fb;border-radius:8px;padding:10px;text-align:center}
.aqlbox .b .k{font-size:10px;text-transform:uppercase;color:#889}
.aqlbox .b .v{font-size:18px;font-weight:800;color:var(--navy)}
.ovbox{background:#fcf3df;border:1px solid #e9c46a;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px}
.coment{background:#f6f8fb;border-radius:8px;padding:12px;font-size:14px;white-space:pre-wrap;min-height:20px}
.fotos{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}
.fotos figure{margin:0}
.fotos img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:zoom-in;background:#f3f5f8}
.fotoblock{margin-top:14px}
.fotoblock .lab{font-weight:700;font-size:12px;color:var(--navy);background:#eef2f7;padding:5px 10px;border-radius:6px;display:inline-block;margin-bottom:6px}
/* lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(15,20,30,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#lb.show{display:flex}
#lb .lbScroll{max-width:96vw;max-height:88vh;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pinch-zoom}
#lb img{max-width:96vw;max-height:88vh;object-fit:contain;border-radius:6px;transition:transform .15s;transform-origin:center;cursor:zoom-in;display:block}
#lb img.zoom{max-width:none;max-height:none;cursor:zoom-out}
#lb #lbTitle{position:absolute;top:18px;left:50%;transform:translateX(-50%);color:#fff;font-weight:700;font-size:15px;background:rgba(31,56,100,.85);padding:8px 18px;border-radius:8px;max-width:80vw;text-align:center}
#lb .rotbtn{position:absolute;top:16px;left:20px;background:#e9c46a;color:#1f3864;border:none;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:700}
#lb .close{position:absolute;top:16px;right:20px;background:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:22px;cursor:pointer;font-weight:700}
#lb .hint{color:#cdd; margin-top:12px;font-size:13px}
.estado{padding:40px;text-align:center;color:#889}
.foot{margin-top:24px;border-top:1px solid var(--line);padding-top:10px;font-size:11px;color:#99a;display:flex;justify-content:space-between}
@media print{
  @page{ size: portrait; margin:10mm; }
  .toolbar{display:none}
  #lb{display:none!important}
  body{background:#fff}
  .page{box-shadow:none;margin:0;max-width:none;padding:0}
  h2{break-after:avoid}
  /* Imprimir SOLO los datos (vertical, limpio). Las fotos se ven/imprimen aparte. */
  .fotoblock, #fotosSec{display:none!important}
  .deffoto{width:40px;height:40px}
  .foot{break-before:avoid}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="toolbar">
  <h1 id="ttl">Reporte de auditoría</h1>
  <div class="acts">
    <button class="tbtn back" onclick="volverAtras()">← Atrás</button>
    <button class="tbtn fotos" id="btnMed" onclick="verFotos('med')" style="display:none">🖼 Hojas de medidas</button>
    <button class="tbtn proc" id="btnProc" onclick="verFotos('proc')" style="display:none">🖼 Medidas de proceso</button>
    <button class="tbtn share" id="btnShare" onclick="compartirReporte()">📤 Compartir</button>
    <button class="tbtn print" onclick="window.print()">🖨 Imprimir datos</button>
  </div>
</div>

<div class="page" id="page"><div class="estado" id="estado">Cargando auditoría…</div></div>

<div id="lb" onclick="cerrarLb(event)">
  <button class="close" onclick="cerrarLb(event,true)">×</button>
  <div id="lbTitle"></div>
  <button class="rotbtn" onclick="girarLb(event)">⟳ Girar</button>
  <div class="lbScroll"><img id="lbImg" src="" alt="foto ampliada"></div>
  <div class="hint">⟳ Girar para enderezar · rueda o pellizca para zoom · doble clic para acercar · toca fuera para cerrar</div>
</div>

<script>
const SHEET_ID='1zM-ajBkOs_PgyzEaXh_gVJ1seXvjRJSVO1ZRql7KnVQ';
const C={id:0,fecha:1,nAud:2,proceso:3,intext:4,servicio:5,cliente:6,grupo:7,estiloL:8,estiloC:9,po:10,color:11,
  destino:12,pedido:13,recibido:14,lote:15,licencia:16,loteAql:17,muestra:18,nivel:19,aceptaMax:20,rechazaMin:21,
  totalDef:22,resAql:23,override:24,ovWho:25,ovWhy:26,resFinal:27,medMuestra:28,medDef:29,medRes:30,auditor:31,
  semana:32,fotoGen:33,loteKey:34,repetido:35,loteCont:36,anio:37,computable:38,reproceso:39,coment:40,totalDer:41,
  fotosMed:42,fotosPro:43};

const qs=new URLSearchParams(location.search), ID=qs.get('id');
let FOTOS_MED=[], FOTOS_PRO=[], ES_COSTURA=false;

async function gviz(tab){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
  const r=await fetch(url); const t=await r.text();
  const j=JSON.parse(t.substring(t.indexOf('{'),t.lastIndexOf('}')+1));
  return (j.table.rows||[]).map(row=>(row.c||[]).map(c=>c&&c.v!=null?String(c.v):''));
}
function norm(s){return String(s||'').trim().toLowerCase();}
function fechaTxt(v){ if(v==null||v==='')return''; const s=String(v); const m=s.match(/^Date\((\d+),(\d+),(\d+)/); if(m){return m[1]+'-'+('0'+(parseInt(m[2])+1)).slice(-2)+'-'+('0'+m[3]).slice(-2);} return s.substring(0,10);}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// Convierte un link de Drive en URL de imagen visible
function driveImg(url){
  if(!url) return '';
  const m=String(url).match(/[-\w]{25,}/);   // id de Drive
  return m ? `https://drive.google.com/thumbnail?id=${m[0]}&sz=w1600` : url;
}
function driveImgFull(url){
  if(!url) return '';
  const m=String(url).match(/[-\w]{25,}/);
  return m ? `https://drive.google.com/thumbnail?id=${m[0]}&sz=w2400` : url;
}
function fotosDe(celda){
  if(!celda) return [];
  return String(celda).split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
}

async function cargar(){
  if(!ID){ document.getElementById('estado').textContent='Falta el ID de la auditoría.'; return; }
  let rows, defs, ders;
  try{
    [rows,defs,ders]=await Promise.all([gviz('AUDITORÍAS'),gviz('DEFECTOS'),gviz('DERIVADOS')]);
  }catch(e){ document.getElementById('estado').textContent='No se pudo cargar.'; return; }

  const r=rows.find(x=>String(x[C.id]).trim()===ID.trim());
  if(!r){ document.getElementById('estado').textContent='No se encontró la auditoría '+ID; return; }

  const misDef=defs.filter(d=>String(d[0]).trim()===ID.trim());
  const misDer=ders.filter(d=>String(d[0]).trim()===ID.trim());
  render(r,misDef,misDer);
}

function render(r,defs,ders){
  document.getElementById('ttl').textContent='Reporte · '+r[C.id];
  const resF=r[C.resFinal]||'—', rn=norm(resF);
  let cls=rn.indexOf('override')>=0?'ov':(rn.indexOf('aprob')>=0?'ap':(rn.indexOf('rech')>=0?'re':''));

  const esCostura=/costura/i.test(r[C.proceso]||'');
  const fMed=fotosDe(r[C.fotosMed]), fPro=fotosDe(r[C.fotosPro]);
  ES_COSTURA=esCostura;
  FOTOS_MED=fMed.map(u=>driveImgFull(u));
  FOTOS_PRO=fPro.map(u=>driveImgFull(u));
  // Mostrar botones según fotos disponibles
  document.getElementById('btnMed').style.display = FOTOS_MED.length ? '' : 'none';
  document.getElementById('btnProc').style.display = (esCostura && FOTOS_PRO.length) ? '' : 'none';

  function fil(k,v){return `<div class="f"><div class="k">${k}</div><div class="v">${esc(v)||'—'}</div></div>`;}

  let html=`
  <div class="head">
    <div>
      <div class="brand">LIVES</div>
      <div class="code">Auditoría Final / Acabados · AC-009-25</div>
      <div class="code">${esc(r[C.id])}</div>
    </div>
    <div class="res">
      <div class="bigres ${cls}">${esc(resF)}</div>
      <div class="code" style="margin-top:6px">Semana ${esc(r[C.semana])} · ${esc(fechaTxt(r[C.fecha]))}</div>
    </div>
  </div>

  <h2>Datos del lote</h2>
  <div class="grid">
    ${fil('Cliente',r[C.cliente])}
    ${fil('Grupo',r[C.grupo])}
    ${fil('Proceso',r[C.proceso])}
    ${fil('Estilo LIVES',r[C.estiloL])}
    ${fil('Estilo cliente',r[C.estiloC])}
    ${fil('PO',r[C.po])}
    ${fil('Color',r[C.color])}
    ${fil('Destino',r[C.destino])}
    ${fil('Servicio / Taller',r[C.servicio])}
    ${fil('N° auditoría',r[C.nAud])}
    ${fil('Interna/Externa',r[C.intext])}
    ${fil('Auditor',r[C.auditor])}
  </div>

  <h2>Cantidades y AQL</h2>
  <div class="grid">
    ${fil('Cant. pedido',r[C.pedido])}
    ${fil('Total recibido',r[C.recibido])}
    ${fil('Lote real',r[C.lote])}
    ${fil('Licencia',r[C.licencia])}
    ${fil('Reproceso',r[C.reproceso])}
    ${fil('Nivel AQL',r[C.nivel])}
  </div>
  <div class="aqlbox">
    <div class="b"><div class="k">Muestra</div><div class="v">${esc(r[C.muestra])||'—'}</div></div>
    <div class="b"><div class="k">Acepta máx</div><div class="v">${esc(r[C.aceptaMax])||'—'}</div></div>
    <div class="b"><div class="k">Total defectos</div><div class="v">${esc(r[C.totalDef])||'0'}</div></div>
    <div class="b"><div class="k">Resultado AQL</div><div class="v" style="font-size:14px">${esc(r[C.resAql])||'—'}</div></div>
  </div>`;

  if(norm(r[C.override]).indexOf('s')===0){
    html+=`<div class="ovbox"><b>Pase al rechazo (override):</b> autorizado por ${esc(r[C.ovWho])||'—'} · Motivo: ${esc(r[C.ovWhy])||'—'}</div>`;
  }

  // Defectos
  html+=`<h2>Defectos (${defs.length})</h2>`;
  if(defs.length){
    html+=`<table><thead><tr><th>Sección</th><th>Categoría</th><th>Subtipo</th><th>Cant.</th><th>Detalle</th><th>Foto</th></tr></thead><tbody>`;
    defs.forEach(d=>{
      const tituloDef = 'Defecto: ' + (d[2]||'') + (d[3]?(' - '+d[3]):'');
      const foto = d[6] ? `<div class="deffotoWrap"><div class="deflab">${esc(tituloDef)}</div><img src="${driveImg(d[6])}" class="deffoto" onclick="abrirLb('${driveImgFull(d[6])}', '${esc(tituloDef).replace(/'/g,"\\'")}')" alt="foto defecto"></div>` : '—';
      html+=`<tr><td>${esc(d[1])}</td><td>${esc(d[2])}</td><td>${esc(d[3]||'—')}</td><td>${esc(d[4])}</td><td>${esc(d[5])}</td><td>${foto}</td></tr>`;
    });
    html+=`</tbody></table>`;
  } else { html+=`<div class="coment">Sin defectos registrados.</div>`; }

  // Derivados
  html+=`<h2>Derivados (${ders.length})</h2>`;
  if(ders.length){
    html+=`<table><thead><tr><th>Categoría</th><th>Subtipo</th><th>Cant. (lote)</th><th>Detalle</th><th>Foto</th></tr></thead><tbody>`;
    ders.forEach(d=>{
      const tituloDer = 'Derivado: ' + (d[2]||'') + (d[3]?(' - '+d[3]):'');
      const foto = d[6] ? `<div class="deffotoWrap"><div class="deflab">${esc(tituloDer)}</div><img src="${driveImg(d[6])}" class="deffoto" onclick="abrirLb('${driveImgFull(d[6])}', '${esc(tituloDer).replace(/'/g,"\\'")}')" alt="foto derivado"></div>` : '—';
      html+=`<tr><td>${esc(d[2])}</td><td>${esc(d[3]||'—')}</td><td>${esc(d[4])}</td><td>${esc(d[5])}</td><td>${foto}</td></tr>`;
    });
    html+=`</tbody></table>`;
  } else { html+=`<div class="coment">Sin derivados registrados.</div>`; }

  // Medidas
  html+=`<h2>Medidas</h2><div class="grid">
    ${fil('Muestra medidas',r[C.medMuestra])}
    ${fil('Def. medidas',r[C.medDef])}
    ${fil('Resultado',r[C.medRes])}
  </div>`;

  // Comentario
  html+=`<h2>Comentario</h2><div class="coment">${esc(r[C.coment])||'—'}</div>`;

  // FOTOS
  html+=`<div id="fotosSec"><h2>Fotos</h2>`;
  if(esCostura && fPro.length){
    html+=`<div class="fotoblock"><span class="lab">MEDIDAS DE PROCESO (COSTURA)</span><div class="fotos">`;
    fPro.forEach(u=>{ const s=driveImg(u); const sf=driveImgFull(u); html+=`<figure><img src="${s}" alt="proceso" loading="lazy" onclick="abrirLb('${sf}','Medidas de proceso')"></figure>`; });
    html+=`</div></div>`;
  }
  if(fMed.length){
    html+=`<div class="fotoblock"><span class="lab">HOJAS DE MEDIDAS</span><div class="fotos">`;
    fMed.forEach(u=>{ const s=driveImg(u); const sf=driveImgFull(u); html+=`<figure><img src="${s}" alt="medidas" loading="lazy" onclick="abrirLb('${sf}','Medidas de auditoría')"></figure>`; });
    html+=`</div></div>`;
  }
  if(!fMed.length && !(esCostura&&fPro.length)){
    html+=`<div class="coment">Sin fotos registradas.</div>`;
  }
  html+=`</div>`;

  html+=`<div class="foot"><span>LIVES · Calidad Manufactura</span><span>Generado ${new Date().toLocaleDateString('es-PE')}</span></div>`;

  document.getElementById('page').innerHTML=html;
}

let lbScale=1, lbDeg=0;
function aplicarZoom(){ const im=document.getElementById('lbImg'); im.style.transform='rotate('+lbDeg+'deg) scale('+lbScale+')'; im.classList.toggle('zoom',lbScale>1); }
function abrirLb(src,titulo){ const lb=document.getElementById('lb'); lbScale=1; lbDeg=0; const im=document.getElementById('lbImg'); im.src=src; im.style.transform=''; im.classList.remove('zoom'); document.getElementById('lbTitle').textContent=titulo||''; lb.classList.add('show'); }
function girarLb(e){ if(e)e.stopPropagation(); lbDeg=(lbDeg+90)%360; aplicarZoom(); }
function cerrarLb(e,force){ if(force||e.target.id==='lb'){ document.getElementById('lb').classList.remove('show'); } }
document.addEventListener('wheel',function(e){
  const lb=document.getElementById('lb'); if(!lb.classList.contains('show')) return;
  if(e.target.id==='lbImg'||e.target.closest('.lbScroll')){ e.preventDefault();
    lbScale += (e.deltaY<0?0.2:-0.2); lbScale=Math.max(1,Math.min(5,lbScale)); aplicarZoom(); }
},{passive:false});
document.addEventListener('dblclick',function(e){ if(e.target.id==='lbImg'){ lbScale=lbScale>1?1:2.5; aplicarZoom(); } });

/* ===== OPCIÓN B: ver/imprimir fotos de medidas por separado ===== */
function verFotos(tipo){
  const todas=[];
  if(tipo==='proc'){
    FOTOS_PRO.forEach(s=>todas.push({src:s,tag:'Medidas de proceso'}));
  } else {
    FOTOS_MED.forEach(s=>todas.push({src:s,tag:'Medidas de auditoría'}));
  }
  if(!todas.length){ alert('Esta auditoría no tiene fotos de ese tipo.'); return; }

  const nombreTipo = (tipo==='proc') ? 'Medidas de proceso' : 'Hojas de medidas';
  const titulo=nombreTipo+' · '+ID;
  let cuerpo='';
  todas.forEach((f,i)=>{
    cuerpo+=`<figure class="hoja" data-deg="0">
      <div class="lab">${f.tag}${todas.length>1?(' · '+(i+1)+'/'+todas.length):''}
        <button class="girar" onclick="girarFoto(this)">⟳ Girar esta foto</button></div>
      <div class="imgbox"><img src="${f.src}" alt="medida"></div>
    </figure>`;
  });

  const doc=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>${titulo}</title>
<style>
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:#3a3f47;color:#fff}
  .bar{position:sticky;top:0;background:#1f3864;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:5}
  .bar h1{font-size:15px;margin:0;font-weight:700}
  .bar button{background:#e9c46a;color:#1f3864;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:13px}
  .wrap{padding:18px;display:flex;flex-direction:column;align-items:center;gap:18px}
  figure{margin:0;background:#fff;border-radius:10px;padding:14px;max-width:96vw;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  figure .lab{color:#1f3864;font-weight:700;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  figure .lab .girar{background:#2a9d8f;color:#fff;border:none;border-radius:7px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:12px}
  .imgbox{display:flex;align-items:center;justify-content:center;overflow:hidden}
  figure img{display:block;max-width:100%;height:auto;border-radius:6px;transition:transform .15s}
  /* rotaciones en pantalla */
  figure[data-deg="90"] img,figure[data-deg="270"] img{max-width:none;max-height:70vh}
  .tip{color:#dfe4ea;font-size:13px;text-align:center;max-width:600px;margin:0 auto 6px}
  @media print{
    @page{ size: portrait; margin:0; }
    body{background:#fff}
    .bar,.tip,.girar{display:none}
    .wrap{padding:0;gap:0}
    figure{break-inside:avoid;page-break-inside:avoid;box-shadow:none;border-radius:0;padding:0;margin:0;
      width:210mm;height:297mm;display:flex;align-items:center;justify-content:center;overflow:hidden}
    figure + figure{break-before:page;page-break-before:always}
    figure .lab{display:block;font-size:11px;font-weight:700;color:#1f3864;padding:3mm 0 1mm;text-align:center}
    .imgbox{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    /* sin rotar: foto horizontal normal */
    figure[data-deg="0"] img,figure[data-deg="180"] img{width:auto;height:auto;max-width:200mm;max-height:287mm;object-fit:contain}
    figure[data-deg="180"] img{transform:rotate(180deg)}
    /* rotada 90/270: la imagen se para y llena la hoja vertical */

/* ===== COMPARTIR REPORTE (PDF sin fotos, por WhatsApp/menú nativo) ===== */
async function compartirReporte(){
  const btn=document.getElementById('btnShare');
  const txtOrig=btn.textContent;
  btn.textContent='Generando…'; btn.disabled=true;
  try{
    // Ocultar fotos temporalmente para que el PDF salga solo con datos
    const estilo=document.createElement('style');
    estilo.id='hideFotos';
    estilo.textContent='.fotoblock,#fotosSec,.deffotoWrap,.deffoto{display:none!important}';
    document.head.appendChild(estilo);

    const page=document.getElementById('page');
    const canvas=await html2canvas(page,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    // quitar el ocultado
    const h=document.getElementById('hideFotos'); if(h) h.remove();

    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pw=210, ph=297;
    const iw=pw, ih=canvas.height*pw/canvas.width;
    let pos=0, left=ih;
    const imgData=canvas.toDataURL('image/jpeg',0.92);
    // paginar si el reporte es más alto que una hoja
    if(ih<=ph){
      pdf.addImage(imgData,'JPEG',0,0,iw,ih);
    } else {
      while(left>0){
        pdf.addImage(imgData,'JPEG',0,pos,iw,ih);
        left-=ph; pos-=ph;
        if(left>0) pdf.addPage();
      }
    }

    const nombre='Auditoria_'+(ID||'reporte')+'.pdf';
    const blob=pdf.output('blob');
    const file=new File([blob],nombre,{type:'application/pdf'});

    // Compartir por menú nativo (WhatsApp, correo, etc.)
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], title:'Auditoría '+ID, text:'Reporte de auditoría '+ID });
    } else {
      // Respaldo: descargar el PDF (luego lo adjuntan manual)
      pdf.save(nombre);
      alert('Se descargó el PDF. Ahora puedes adjuntarlo en WhatsApp.');
    }
  }catch(err){
    alert('No se pudo generar el PDF: '+(err.message||err));
    const h=document.getElementById('hideFotos'); if(h) h.remove();
  }finally{
    btn.textContent=txtOrig; btn.disabled=false;
  }
}

function volverAtras(){
  // Si venimos de buscar.html (mismo sitio), usar el "atrás" real del navegador (conserva los filtros de búsqueda).
  // Si se abrió el enlace directo (ej. compartido por WhatsApp), no hay a dónde volver: ir a buscar.html.
  if(document.referrer && document.referrer.indexOf(location.origin)===0){
    history.back();
  } else {
    location.href='buscar.html';
  }
}
